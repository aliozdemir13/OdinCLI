name: Quality Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Tests
        run: |
          go test -v -coverprofile=coverage.out ./internal/...
          go tool cover -func=coverage.out

      - name: Check Coverage Threshold
        run: |
          THRESHOLD=90
          # We use awk to handle the decimal comparison safely
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          
          # Stable way to compare floats in shell
          VALID=$(echo "$COVERAGE >= $THRESHOLD" | bc -l)
          if [ "$VALID" -eq 0 ]; then
            echo "Error: Coverage is $COVERAGE%, which is below the $THRESHOLD% threshold."
            exit 1
          fi