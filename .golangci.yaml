version: 2

run:
  go: '1.25'
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused
    - typecheck # Crucial for detecting version/dependency issues

issues:
  # Excluding common false positives in tests if necessary
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck